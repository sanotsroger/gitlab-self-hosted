networks:
  gitlab-network:
    name: ${GITLAB_NETWORK:-gitlab-name}
    external: true
    ipam:
      config:
        - subnet: ${CONTAINERS_SUBNET}/24

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  gitlab_runner_data:
  gitlab_runner_token:

services:
  gitlab-server:
    image: gitlab/gitlab-ce:${GITLAB_VERSION:-18.11.7-ce.0}
    container_name: gitlab-server
    restart: always
    environment:
      GITLAB_ROOT_EMAIL: ${GITLAB_ROOT_EMAIL}
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD}
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${EXTERNAL_URL}'       
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        nginx['redirect_http_to_https'] = false
        puma['worker_processes'] = 0
        prometheus_monitoring['enable'] = false
        postgresql['shared_buffers'] = "256MB"
        sidekiq['concurrency'] = 5
        # Registry para imagens docker
        registry_external_url '${REGISTRY_URL}'
        registry['enable'] = true
        registry['token_realm'] = '${EXTERNAL_URL}'
        registry_nginx['enable'] = true
        registry_nginx['listen_https'] = false
        registry_nginx['listen_port'] = 5050
        registry_nginx['proxy_set_headers']['X-Forwarded-Proto'] = 'https'
        registry_nginx['proxy_set_headers']['X-Forwarded-Ssl'] = 'on'
        # Otimizações
        gitlab_rails['session_expire_delay'] = 10080  # 7 days
        gitlab_rails['backup_keep_time'] = 604800  # 7 days
        gitlab_rails['gitlab_email_enabled'] = false
        prometheus['enable'] = false
        prometheus['monitor_kubernetes'] = false
        postgresql['max_worker_processes'] = 4
        puma['worker_proccesses'] = 0
        gitlab_kas['enable'] = false
        sentinel['enable'] = false
        # Gitlab Pages
        pages_external_url '${PAGES_URL}'
        gitlab_pages['enable'] = true
        gitlab_pages['namespace_in_path'] = true
        pages_nginx['enable'] = true
        gitlab_pages['internal_gitlab_server'] = 'http://localhost:80'
        pages_nginx['listen_port'] = ${PAGES_PORT_INTERNAL:-8090}
        pages_nginx['listen_https'] = false
        pages_nginx['redirect_http_to_https'] = false
        gitlab_rails['monitoring_whitelist'] = ['127.0.0.0/8', '${CONTAINERS_SUBNET}/24']
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
      - ./scripts:/scripts:ro
    ports:
      - ${HTTP_PORT:-80}:80
      - ${SSH_PORT:-22}:22
      - ${REGISTRY_PORT:-5050}:5050
      - ${PAGES_PORT_EXTERNAL:-8090}:${PAGES_PORT_INTERNAL:-8090}
    networks:
      gitlab-network:
        ipv4_address: ${GITLAB_IP}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 8G

  gitlab-runner-token-init:
    image: curlimages/curl:latest
    container_name: gitlab-runner-token-init
    restart: "no"
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitlab_runner_token:/token
      - ./scripts:/scripts:ro
    networks:
      gitlab-network:
        ipv4_address: ${GITLAB_TOKEN_IP}
    depends_on:
      gitlab-server:
        condition: service_healthy
    environment:
      GITLAB_INTERNAL_URL: http://${GITLAB_IP}
      GITLAB_RUNNER_DESCRIPTION: ${GITLAB_RUNNER_DESCRIPTION}
      GITLAB_RUNNER_TAGS: ${GITLAB_RUNNER_TAGS}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "apk add --no-cache bash docker-cli jq >/dev/null 2>&1 && bash /scripts/token-init.sh"

  gitlab-runner:
    image: gitlab/gitlab-runner:${GITLAB_RUNNER_VERSION:-latest}
    container_name: gitlab-runner
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitlab_runner_data:/etc/gitlab-runner
      - gitlab_runner_token:/token:ro
      - ./scripts:/scripts:ro
    networks:
      gitlab-network:
        ipv4_address: ${GITLAB_RUNNER_IP}
    depends_on:
      gitlab-runner-token-init:
        condition: service_completed_successfully
    environment:
      GITLAB_IP: ${GITLAB_IP}
      GITLAB_NETWORK: ${GITLAB_NETWORK}
      GITLAB_RUNNER_DESCRIPTION: ${GITLAB_RUNNER_DESCRIPTION}
      GITLAB_RUNNER_TAGS: ${GITLAB_RUNNER_TAGS}
      GITLAB_RUNNER_DOCKER_IMAGE: ${GITLAB_RUNNER_DOCKER_IMAGE:-alpine:3.21}
    entrypoint: ["/bin/bash", "/scripts/runner-entrypoint.sh"]
